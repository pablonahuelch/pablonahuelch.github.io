<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro Histórico de Pozo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 20px;
    }

    .contenedor {
      max-width: 820px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d9e2ef;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 24px;
    }

    .fila {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #bfcde0;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.12);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .botones {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-guardar {
      background: #198754;
      color: white;
    }

    .btn-limpiar {
      background: #6c757d;
      color: white;
    }

    .mensaje {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid transparent;
      display: none;
      white-space: pre-wrap;
    }

    .mensaje.success {
      display: block;
      background: #eaf7ee;
      border-color: #b9e0c3;
      color: #146c43;
    }

    .mensaje.warning {
      display: block;
      background: #fff8e1;
      border-color: #f5d98b;
      color: #8a6d1d;
    }

    .mensaje.error {
      display: block;
      background: #fdecec;
      border-color: #f1b5b5;
      color: #b42318;
    }

    .info {
      margin-top: 8px;
      color: #5b6573;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>Registrar Histórico de Pozo</h1>

    <form id="formHistorico">
      <div class="fila">
        <label for="idPozo">ID Pozo</label>
        <input type="number" id="idPozo" name="idPozo" required min="1" />
      </div>

      <div class="fila">
        <label for="fechaHora">Fecha y hora</label>
        <input type="datetime-local" id="fechaHora" name="fechaHora" required />
        <div class="info">Si querés, este campo puede quedar autocompletado con la fecha y hora actual.</div>
      </div>

      <div class="fila">
        <label for="observaciones">Observaciones</label>
        <textarea id="observaciones" name="observaciones" placeholder="Ej.: Se revisó tablero, se reemplazó contactor, se verificó caudal, etc." required></textarea>
      </div>

      <div class="botones">
        <button type="submit" class="btn-guardar">Guardar Histórico</button>
        <button type="button" class="btn-limpiar" id="btnLimpiar">Limpiar</button>
      </div>
    </form>

    <div id="mensaje" class="mensaje"></div>
  </div>

  <script>
    const WEBHOOK_HISTORICO = "https://pablonahuel.app.n8n.cloud/webhook/guardar-historico";

    const form = document.getElementById("formHistorico");
    const mensaje = document.getElementById("mensaje");
    const btnLimpiar = document.getElementById("btnLimpiar");

    function mostrarMensaje(texto, tipo = "success") {
      mensaje.className = "mensaje " + tipo;
      mensaje.textContent = texto;
      mensaje.style.display = "block";
    }

    function limpiarMensaje() {
      mensaje.className = "mensaje";
      mensaje.textContent = "";
      mensaje.style.display = "none";
    }

    function limpiarFormulario() {
      form.reset();
      setFechaHoraActual();
      limpiarMensaje();
    }

    function setFechaHoraActual() {
      const ahora = new Date();
      const offset = ahora.getTimezoneOffset();
      const local = new Date(ahora.getTime() - offset * 60000)
        .toISOString()
        .slice(0, 16);
      document.getElementById("fechaHora").value = local;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      limpiarMensaje();

      const payload = {
        ID_Pozo: document.getElementById("idPozo").value.trim(),
        Fecha_Hora: document.getElementById("fechaHora").value.trim(),
        Observaciones: document.getElementById("observaciones").value.trim()
      };

      console.log("Payload enviado:", payload);

      try {
        const response = await fetch(WEBHOOK_HISTORICO, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        console.log("Respuesta status:", response.status);

        let data = {};
        const textoPlano = await response.text();

        try {
          data = textoPlano ? JSON.parse(textoPlano) : {};
        } catch {
          data = { mensaje: textoPlano || "Respuesta no válida del servidor" };
        }

        console.log("Respuesta body:", data);

        if (!response.ok) {
          mostrarMensaje(data.mensaje || "Error al registrar histórico.", "error");
          return;
        }

        if (data.ok === false) {
          mostrarMensaje(data.mensaje || "No se pudo registrar.", "warning");
          return;
        }

        mostrarMensaje(
          data.mensaje || "Histórico guardado correctamente.",
          "success"
        );

        document.getElementById("observaciones").value = "";
      } catch (error) {
        console.error("Error en fetch:", error);
        mostrarMensaje("Error de conexión con el servidor.", "error");
      }
    });

    btnLimpiar.addEventListener("click", limpiarFormulario);

    setFechaHoraActual();
  </script>
</body>
</html>
