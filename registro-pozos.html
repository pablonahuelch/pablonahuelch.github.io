<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Clientes, Pozos e Historial</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      margin: 0;
      background: #f4f6f9;
      color: #222;
    }

    .contenedor {
      width: 95%;
      max-width: 1400px;
      margin: 20px auto;
    }

    .fila-superior {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .bloque {
      background: #fff;
      border: 2px solid #222;
      border-radius: 8px;
      overflow: hidden;
      min-height: 250px;
    }

    .bloque h2,
    .bloque-inferior h2 {
      margin: 0;
      padding: 14px 12px;
      text-align: center;
      border-bottom: 2px solid #222;
      font-size: 22px;
      color: #fff;
      font-weight: bold;
      letter-spacing: 0.3px;
      transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .bloque h2:hover,
    .bloque-inferior h2:hover {
      filter: brightness(1.05);
    }

    .bloque h2:active,
    .bloque-inferior h2:active {
      transform: scale(0.995);
    }

    .bloque h2:focus-visible,
    .bloque-inferior h2:focus-visible {
      outline: 3px solid rgba(0,0,0,0.25);
      outline-offset: -3px;
    }

    .titulo-seleccion {
      background: linear-gradient(135deg, #0d6efd, #3b82f6);
    }

    .titulo-creacion {
      background: linear-gradient(135deg, #198754, #20c997);
    }

    .titulo-pozos {
      background: linear-gradient(135deg, #fd7e14, #f59e0b);
    }

    iframe {
      width: 100%;
      border: none;
      display: block;
      background: white;
    }

    #frameCliente,
    #frameCrearCliente {
      height: 360px;
    }

    #framePozoHistorial {
      height: 780px;
    }

    .bloque-inferior {
      background: #fff;
      border: 2px solid #222;
      border-radius: 8px;
      overflow: hidden;
    }

    .barra-estado {
      margin-bottom: 14px;
      padding: 12px 16px;
      background: #e9f3ff;
      border: 1px solid #b8d7ff;
      border-radius: 8px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      background: #fff;
      border: 1px solid #b8d7ff;
      border-radius: 20px;
      padding: 8px 12px;
      font-size: 14px;
    }

    .acciones {
      margin-left: auto;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      font-weight: bold;
    }

    .btn-sec {
      background: #4b5563;
      color: white;
    }

    .titulo-info {
      font-size: 13px;
      text-align: center;
      color: rgba(255,255,255,0.95);
      margin-top: 4px;
      font-weight: normal;
    }

    @media (max-width: 900px) {
      .fila-superior {
        grid-template-columns: 1fr;
      }

      .acciones {
        margin-left: 0;
        width: 100%;
      }

      .bloque h2,
      .bloque-inferior h2 {
        font-size: 20px;
        padding: 16px 12px;
      }

      #frameCliente,
      #frameCrearCliente {
        height: 400px;
      }

      #framePozoHistorial {
        height: 860px;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="barra-estado">
      <div class="pill"><strong>Cliente seleccionado:</strong> <span id="lblCliente">Ninguno</span></div>
      <div class="pill"><strong>Pozo seleccionado:</strong> <span id="lblPozo">Ninguno</span></div>

      <div class="acciones">
        <button class="btn-sec" onclick="limpiarSeleccion()">Limpiar selección</button>
      </div>
    </div>

    <div class="fila-superior">
      <div class="bloque" id="bloqueSeleccionCliente">
        <h2
          class="titulo-seleccion"
          tabindex="0"
          onclick="irASeccion('cliente')"
          onkeydown="if(event.key==='Enter' || event.key===' '){ event.preventDefault(); irASeccion('cliente'); }"
          title="Tocar para ir al formulario de selección de cliente"
        >
          Selección de cliente
          <div class="titulo-info">Tocar aquí para enfocarte en esta sección</div>
        </h2>
        <iframe id="frameCliente" src="seleccion_cliente.html"></iframe>
      </div>

      <div class="bloque" id="bloqueCreacionCliente">
        <h2
          class="titulo-creacion"
          tabindex="0"
          onclick="irASeccion('crearCliente')"
          onkeydown="if(event.key==='Enter' || event.key===' '){ event.preventDefault(); irASeccion('crearCliente'); }"
          title="Tocar para ir al formulario de creación de cliente"
        >
          Creación de cliente
          <div class="titulo-info">Tocar aquí para enfocarte en esta sección</div>
        </h2>
        <iframe id="frameCrearCliente" src="crear_cliente.html"></iframe>
      </div>
    </div>

    <div class="bloque-inferior" id="bloquePozos">
      <h2
        class="titulo-pozos"
        tabindex="0"
        onclick="irASeccion('pozos')"
        onkeydown="if(event.key==='Enter' || event.key===' '){ event.preventDefault(); irASeccion('pozos'); }"
        title="Tocar para ir a la gestión de pozos"
      >
        En esta sección: Registra y Consulta la gestión de pozos
        <div class="titulo-info">Tocar aquí para enfocarte en esta sección</div>
      </h2>
      <iframe id="framePozoHistorial" src="pozo_historial.html"></iframe>
    </div>
  </div>

  <script>
    const estado = {
      clienteId: "",
      clienteNombre: "",
      pozoId: "",
      pozoDescripcion: ""
    };

    const lblCliente = document.getElementById("lblCliente");
    const lblPozo = document.getElementById("lblPozo");
    const framePozoHistorial = document.getElementById("framePozoHistorial");
    const frameCliente = document.getElementById("frameCliente");
    const frameCrearCliente = document.getElementById("frameCrearCliente");

    function refrescarEstadoVisual() {
      lblCliente.textContent = estado.clienteNombre || "Ninguno";
      lblPozo.textContent = estado.pozoDescripcion || "Ninguno";
    }

    function limpiarSeleccion() {
      estado.clienteId = "";
      estado.clienteNombre = "";
      estado.pozoId = "";
      estado.pozoDescripcion = "";
      refrescarEstadoVisual();

      framePozoHistorial.contentWindow.postMessage({
        tipo: "cliente-limpiado"
      }, "*");
    }

    function scrollSuaveA(elemento) {
      if (!elemento) return;
      elemento.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    function enfocarPrimerCampoEnIframe(iframe, mensajeTipo) {
      if (!iframe) return;

      try {
        const doc = iframe.contentWindow.document;

        const candidato =
          doc.querySelector("input:not([type='hidden']):not([disabled])") ||
          doc.querySelector("select:not([disabled])") ||
          doc.querySelector("textarea:not([disabled])") ||
          doc.querySelector("button:not([disabled])");

        if (candidato) {
          setTimeout(() => {
            candidato.focus();
            if (typeof candidato.select === "function" && (candidato.tagName === "INPUT" || candidato.tagName === "TEXTAREA")) {
              candidato.select();
            }
          }, 250);
        }
      } catch (e) {
        // Si no deja acceder directamente al iframe, usamos postMessage.
      }

      iframe.contentWindow.postMessage({ tipo: mensajeTipo }, "*");
    }

    function ajustarDescripcionCrearCliente() {
      try {
        const doc = frameCrearCliente.contentWindow.document;

        const campoDescripcion =
          doc.querySelector("#Descripcion") ||
          doc.querySelector("[name='Descripcion']") ||
          doc.querySelector("[name='descripcion']") ||
          doc.querySelector("#descripcion") ||
          doc.querySelector("textarea");

        if (campoDescripcion) {
          campoDescripcion.style.minHeight = "60px";
          campoDescripcion.style.height = "60px";
          campoDescripcion.style.maxHeight = "80px";
          campoDescripcion.style.resize = "vertical";

          if (campoDescripcion.tagName === "TEXTAREA") {
            campoDescripcion.rows = 2;
          }
        }
      } catch (e) {
        // Si no se puede tocar desde acá, habrá que hacerlo dentro de crear_cliente.html
      }
    }

    function irASeccion(seccion) {
      if (seccion === "cliente") {
        scrollSuaveA(document.getElementById("bloqueSeleccionCliente"));
        enfocarPrimerCampoEnIframe(frameCliente, "enfocar-seleccion-cliente");
      }

      if (seccion === "crearCliente") {
        scrollSuaveA(document.getElementById("bloqueCreacionCliente"));
        enfocarPrimerCampoEnIframe(frameCrearCliente, "enfocar-crear-cliente");
      }

      if (seccion === "pozos") {
        scrollSuaveA(document.getElementById("bloquePozos"));
        enfocarPrimerCampoEnIframe(framePozoHistorial, "enfocar-pozos");
      }
    }

    frameCrearCliente.addEventListener("load", () => {
      setTimeout(() => {
        ajustarDescripcionCrearCliente();
      }, 300);
    });

    window.addEventListener("message", (event) => {
      const data = event.data || {};

      if (data.tipo === "cliente-seleccionado") {
        estado.clienteId = data.clienteId || "";
        estado.clienteNombre = data.clienteNombre || "";
        estado.pozoId = "";
        estado.pozoDescripcion = "";
        refrescarEstadoVisual();

        framePozoHistorial.contentWindow.postMessage({
          tipo: "cliente-seleccionado",
          clienteId: estado.clienteId,
          clienteNombre: estado.clienteNombre
        }, "*");
      }

      if (data.tipo === "cliente-creado") {
        frameCliente.contentWindow.postMessage({ tipo: "recargar-clientes" }, "*");
        alert("Cliente creado correctamente.");
      }

      if (data.tipo === "pozo-seleccionado") {
        estado.pozoId = data.pozoId || "";
        estado.pozoDescripcion = data.pozoDescripcion || "";
        refrescarEstadoVisual();
      }

      if (data.tipo === "pozo-creado") {
        estado.pozoId = data.pozoId || "";
        estado.pozoDescripcion = data.pozoDescripcion || "";
        refrescarEstadoVisual();

        framePozoHistorial.contentWindow.postMessage({
          tipo: "cliente-seleccionado",
          clienteId: estado.clienteId,
          clienteNombre: estado.clienteNombre,
          refrescar: true
        }, "*");
      }

      if (data.tipo === "historico-guardado") {
        alert("Histórico guardado correctamente.");
        framePozoHistorial.contentWindow.postMessage({
          tipo: "refrescar-historico",
          pozoId: estado.pozoId
        }, "*");
      }
    });

    refrescarEstadoVisual();
  </script>
</body>
</html>
