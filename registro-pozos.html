<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Clientes</title>
</head>
<body>

  <h2>Agregar Cliente</h2>

  <input type="text" id="cliente" placeholder="Nombre del cliente">
  <button onclick="guardarCliente()">Guardar</button>

  <pre id="resultado"></pre>

  <script>
    async function guardarCliente() {

      const nombre = document.getElementById("cliente").value;

      const res = await fetch("https://pablonahuel.app.n8n.cloud/webhook/guardar-cliente", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          Razon_Social: nombre
        })
      });

const data = await res.json();

if (data.accion === "guardado") {
  document.getElementById("resultado").innerText =
    "✅ Cliente guardado: " + data.Razon_Social + " (ID: " + data.ID_Cliente + ")";
}
else if (data.accion === "existe") {
  document.getElementById("resultado").innerText =
    "⚠️ El cliente ya existe: " + data.Razon_Social + " (ID: " + data.ID_Cliente + ")";
}
else if (data.accion === "error") {
  document.getElementById("resultado").innerText =
    "❌ Error: " + data.mensaje;
}
    }
  </script>

</body>
</html>
