<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Clientes, Pozos e Historial</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      margin: 0;
      background: #f4f6f9;
      color: #222;
    }

    .contenedor {
      width: 95%;
      max-width: 1400px;
      margin: 20px auto;
    }

    .fila-superior {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .bloque {
      background: #fff;
      border: 2px solid #222;
      border-radius: 8px;
      overflow: hidden;
      min-height: 250px;
    }

    .bloque h2 {
      margin: 0;
      padding: 12px;
      text-align: center;
      background: #f0f0f0;
      border-bottom: 2px solid #222;
      font-size: 22px;
    }

    iframe {
      width: 100%;
      border: none;
      display: block;
      background: white;
    }

    #frameCliente,
    #frameCrearCliente {
      height: 360px;
    }

    #framePozoHistorial {
      height: 780px;
    }

    .bloque-inferior {
      background: #fff;
      border: 2px solid #222;
      border-radius: 8px;
      overflow: hidden;
    }

    .bloque-inferior h2 {
      margin: 0;
      padding: 12px;
      text-align: center;
      background: #f0f0f0;
      border-bottom: 2px solid #222;
      font-size: 22px;
    }

    .barra-estado {
      margin-bottom: 14px;
      padding: 12px 16px;
      background: #e9f3ff;
      border: 1px solid #b8d7ff;
      border-radius: 8px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      background: #fff;
      border: 1px solid #b8d7ff;
      border-radius: 20px;
      padding: 8px 12px;
      font-size: 14px;
    }

    .acciones {
      margin-left: auto;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      font-weight: bold;
    }

    .btn-sec {
      background: #4b5563;
      color: white;
    }

    .btn-pri {
      background: #0d6efd;
      color: white;
    }

    .btn-ok {
      background: #198754;
      color: white;
    }

    @media (max-width: 900px) {
      .fila-superior {
        grid-template-columns: 1fr;
      }

      .acciones {
        margin-left: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="barra-estado">
      <div class="pill"><strong>Cliente seleccionado:</strong> <span id="lblCliente">Ninguno</span></div>
      <div class="pill"><strong>Pozo seleccionado:</strong> <span id="lblPozo">Ninguno</span></div>

      <div class="acciones">
        <button class="btn-pri" onclick="abrirModoCrearPozo()">Crear pozo para cliente seleccionado</button>
        <button class="btn-sec" onclick="limpiarSeleccion()">Limpiar selección</button>
      </div>
    </div>

    <div class="fila-superior">
      <div class="bloque">
        <h2>Selección de cliente</h2>
        <iframe id="frameCliente" src="seleccion_cliente.html"></iframe>
      </div>

      <div class="bloque">
        <h2>Creación de cliente</h2>
        <iframe id="frameCrearCliente" src="crear_cliente.html"></iframe>
      </div>
    </div>

    <div class="bloque-inferior">
      <h2>En esta sección: Registra y Consulta la gestion de pozos</h2>
      <iframe id="framePozoHistorial" src="pozo_historial.html"></iframe>
    </div>
  </div>

  <script>
    const estado = {
      clienteId: "",
      clienteNombre: "",
      pozoId: "",
      pozoDescripcion: ""
    };

    const lblCliente = document.getElementById("lblCliente");
    const lblPozo = document.getElementById("lblPozo");
    const framePozoHistorial = document.getElementById("framePozoHistorial");
    const frameCliente = document.getElementById("frameCliente");
    const frameCrearCliente = document.getElementById("frameCrearCliente");

    function refrescarEstadoVisual() {
      lblCliente.textContent = estado.clienteNombre || "Ninguno";
      lblPozo.textContent = estado.pozoDescripcion || "Ninguno";
    }

    function limpiarSeleccion() {
      estado.clienteId = "";
      estado.clienteNombre = "";
      estado.pozoId = "";
      estado.pozoDescripcion = "";
      refrescarEstadoVisual();
      framePozoHistorial.contentWindow.postMessage({
        tipo: "cliente-limpiado"
      }, "*");
    }

    function abrirModoCrearPozo() {
      if (!estado.clienteId) {
        alert("Primero seleccioná un cliente.");
        return;
      }

      estado.pozoId = "";
      estado.pozoDescripcion = "";
      refrescarEstadoVisual();

      framePozoHistorial.contentWindow.postMessage({
        tipo: "abrir-crear-pozo",
        clienteId: estado.clienteId,
        clienteNombre: estado.clienteNombre
      }, "*");
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};

      if (data.tipo === "cliente-seleccionado") {
        estado.clienteId = data.clienteId || "";
        estado.clienteNombre = data.clienteNombre || "";
        estado.pozoId = "";
        estado.pozoDescripcion = "";
        refrescarEstadoVisual();

        framePozoHistorial.contentWindow.postMessage({
          tipo: "cliente-seleccionado",
          clienteId: estado.clienteId,
          clienteNombre: estado.clienteNombre
        }, "*");
      }

      if (data.tipo === "cliente-creado") {
        frameCliente.contentWindow.postMessage({ tipo: "recargar-clientes" }, "*");
        alert("Cliente creado correctamente.");
      }

      if (data.tipo === "pozo-seleccionado") {
        estado.pozoId = data.pozoId || "";
        estado.pozoDescripcion = data.pozoDescripcion || "";
        refrescarEstadoVisual();
      }

      if (data.tipo === "pozo-creado") {
        estado.pozoId = data.pozoId || "";
        estado.pozoDescripcion = data.pozoDescripcion || "";
        refrescarEstadoVisual();

        framePozoHistorial.contentWindow.postMessage({
          tipo: "cliente-seleccionado",
          clienteId: estado.clienteId,
          clienteNombre: estado.clienteNombre,
          refrescar: true
        }, "*");
      }

      if (data.tipo === "historico-guardado") {
        alert("Histórico guardado correctamente.");
        framePozoHistorial.contentWindow.postMessage({
          tipo: "refrescar-historico",
          pozoId: estado.pozoId
        }, "*");
      }
    });

    refrescarEstadoVisual();
  </script>
</body>
</html>
