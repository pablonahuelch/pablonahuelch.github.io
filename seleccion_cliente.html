<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selección de Cliente</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 14px;
      background: #fff;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 18px;
    }

    .grupo {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #c8c8c8;
      border-radius: 6px;
      font-size: 15px;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .btn-principal {
      background: #1677ff;
      color: white;
    }

    .btn-seleccionar {
      background: #198754;
      color: white;
      white-space: nowrap;
    }

    .lista {
      margin-top: 14px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      background: #fafafa;
      max-height: 420px;
      overflow-y: auto;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid #ececec;
    }

    .item:last-child {
      border-bottom: none;
    }

    .cliente-info {
      flex: 1;
      min-width: 0;
    }

    .cliente-nombre {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .cliente-extra {
      font-size: 13px;
      color: #666;
      word-break: break-word;
    }

    .mensaje {
      padding: 14px;
      color: #555;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>
<body>
  <h3>Buscar cliente</h3>

  <div class="grupo">
    <input type="text" id="txtBuscar" placeholder="Escribí Razón Social..." />
  </div>

  <div class="grupo">
    <button class="btn-principal" onclick="cargarClientes()">Actualizar listado</button>
  </div>

  <div id="listaClientes" class="lista">
    <div class="mensaje">Cargando clientes...</div>
  </div>

  <script>
    // CAMBIÁ ESTA URL POR LA TUYA
    // Si estás probando con "Listen for test event", usá webhook-test
    // Si el flujo está activo, usá webhook
    const URL_LISTAR_CLIENTES = "https://pablonahuel.app.n8n.cloud/webhook/listar-clientes";

    let clientes = [];

    async function cargarClientes() {
      const lista = document.getElementById("listaClientes");
      lista.innerHTML = `<div class="mensaje">Cargando clientes...</div>`;

      try {
        const res = await fetch(URL_LISTAR_CLIENTES, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({})
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();

        // n8n puede devolver array directo o dentro de alguna propiedad
        clientes = Array.isArray(data) ? data : (data.items || data.data || []);

        renderClientes();
      } catch (error) {
        console.error("Error al cargar clientes:", error);
        lista.innerHTML = `<div class="mensaje error">Error al cargar clientes.</div>`;
      }
    }

    function renderClientes() {
      const lista = document.getElementById("listaClientes");
      const texto = document.getElementById("txtBuscar").value.trim().toLowerCase();

      const filtrados = clientes.filter(c => {
        const razon = String(c.Razon_Social || "").toLowerCase();
        return razon.includes(texto);
      });

      if (!filtrados.length) {
        lista.innerHTML = `<div class="mensaje">No se encontraron clientes.</div>`;
        return;
      }

      lista.innerHTML = filtrados.map(c => {
        const idCliente = String(c.ID_Cliente ?? "");
        const razonSocial = String(c.Razon_Social ?? "Sin nombre");
        const telefono = String(c.Telefono ?? "");
        const descripcion = String(c.Descripcion ?? "");

        return `
          <div class="item">
            <div class="cliente-info">
              <div class="cliente-nombre">${escapeHtml(razonSocial)}</div>
              <div class="cliente-extra">
                ${telefono ? `Teléfono: ${escapeHtml(telefono)}` : ""}
                ${telefono && descripcion ? " | " : ""}
                ${descripcion ? `Descripción: ${escapeHtml(descripcion)}` : ""}
              </div>
            </div>
            <button 
              class="btn-seleccionar"
              onclick="seleccionarCliente('${escapeJs(idCliente)}', '${escapeJs(razonSocial)}')"
            >
              Seleccionar
            </button>
          </div>
        `;
      }).join("");
    }

    function seleccionarCliente(idCliente, razonSocial) {
      // Al padre le mandamos el ID para trabajar internamente,
      // pero al usuario le mostramos Razón Social
      window.parent.postMessage({
        tipo: "cliente-seleccionado",
        clienteId: idCliente,
        clienteNombre: razonSocial
      }, "*");
    }

    function escapeHtml(texto) {
      return String(texto)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeJs(texto) {
      return String(texto)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll('"', '\\"')
        .replaceAll("\n", " ")
        .replaceAll("\r", " ");
    }

    document.getElementById("txtBuscar").addEventListener("input", renderClientes);

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.tipo === "recargar-clientes") {
        cargarClientes();
      }
    });

    cargarClientes();
  </script>
</body>
</html>
