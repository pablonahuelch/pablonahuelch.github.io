<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servicios Santa Maria - Portal Interno</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: url('https://images.unsplash.com/photo-1509391366360-2e959784a276?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(2px);
    }

    .login-box {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 24px;
      padding: 34px 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      color: white;
    }

    .login-box h1 {
      font-size: 3rem;
      line-height: 1.05;
      font-weight: bold;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #65f6ff, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-box p {
      margin-bottom: 22px;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.9);
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: rgba(255,255,255,0.95);
    }

    .field select,
    .field input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      border: 2px solid rgba(101,246,255,0.45);
      background: rgba(0,0,0,0.20);
      color: white;
      font-size: 1rem;
      outline: none;
    }

    .field select option {
      color: black;
    }

    .field input::placeholder {
      color: rgba(255,255,255,0.65);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      gap: 15px;
    }

    .footer-text {
      color: rgba(255,255,255,0.75);
      font-size: 0.95rem;
    }

    button {
      border: none;
      background: linear-gradient(90deg, #72f7ff, #8bdcff);
      color: #002a34;
      font-weight: bold;
      padding: 14px 28px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 14px rgba(114,247,255,0.35);
    }

    button:hover {
      transform: translateY(-1px);
    }

    .error {
      margin-top: 14px;
      color: #ffd1d1;
      font-size: 0.95rem;
      min-height: 22px;
    }

    @media (max-width: 640px) {
      .login-box {
        margin: 18px;
        padding: 26px 20px;
      }

      .login-box h1 {
        font-size: 2.2rem;
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Servicios Santa Maria</h1>
    <p>Portal interno</p>

    <div class="field">
      <label for="usuario">Usuario</label>
      <select id="usuario">
        <option value="Ingeniero Roque Chaile">Ingeniero Roque Chaile</option>
        <option value="Administración">Administración</option>
        <option value="Operador">Operador</option>
      </select>
    </div>

    <div class="field">
      <label for="portal">Portal</label>
      <select id="portal">
        <option value="presupuesto.html">Presupuesto</option>
        <option value="registro-pozos.html">Registro de Pozos</option>
      </select>
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Ingresar contraseña" />
    </div>

    <div class="actions">
      <div class="footer-text">Acceso restringido</div>
      <button onclick="ingresar()">Ingresar</button>
    </div>

    <div class="error" id="errorMsg"></div>
  </div>

  <script>
    function ingresar() {
      const password = document.getElementById("password").value.trim();
      const portal = document.getElementById("portal").value;
      const errorMsg = document.getElementById("errorMsg");

      const claveCorrecta = "16503745"; // CAMBIAR por tu clave real

      if (!password) {
        errorMsg.textContent = "Ingrese la contraseña.";
        return;
      }

      if (password !== claveCorrecta) {
        errorMsg.textContent = "Contraseña incorrecta.";
        return;
      }

      errorMsg.textContent = "";
      window.location.href = portal;
    }

    document.getElementById("password").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        ingresar();
      }
    });
  </script>
</body>
</html>
