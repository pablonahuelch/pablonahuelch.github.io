<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pozo / Historial</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      margin: 0;
      padding: 16px;
      background: #fff;
      color: #222;
    }

    .encabezado {
      background: #eef4ff;
      border: 1px solid #c7dafc;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 18px;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 18px;
    }

    .card {
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      background: #fff;
      padding: 16px;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 15px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #c9c9c9;
      border-radius: 7px;
      font-size: 15px;
      margin-bottom: 12px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .fila-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .fila-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .acciones {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    button {
      border: none;
      border-radius: 7px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .btn-pri { background: #1677ff; color: white; }
    .btn-ok { background: #198754; color: white; }
    .btn-sec { background: #6c757d; color: white; }
    .btn-alt { background: #fd7e14; color: white; }

    .lista {
      border: 1px solid #e3e3e3;
      border-radius: 8px;
      background: #fafafa;
      max-height: 600px;
      overflow-y: auto;
    }

    .item {
      border-bottom: 1px solid #ececec;
      padding: 12px;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-titulo {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 5px;
    }

    .item-sub {
      color: #555;
      font-size: 14px;
      line-height: 1.4;
    }

    .item-acciones {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mensaje {
      padding: 10px 0;
      color: #555;
      font-size: 14px;
    }

    .error {
      color: #b00020;
    }

    .ok {
      color: #198754;
    }

    .oculto {
      display: none;
    }

    #mapaPozo {
      width: 100%;
      height: 320px;
      border: 1px solid #c9c9c9;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .coord-box {
      background: #f6f6f6;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    @media (max-width: 1000px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .fila-2, .fila-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="encabezado">
    <div><strong>Cliente actual:</strong> <span id="lblCliente">Ninguno seleccionado</span></div>
    <div><strong>Pozo actual:</strong> <span id="lblPozo">Ninguno seleccionado</span></div>
  </div>

  <div class="grid">
    <!-- IZQUIERDA -->
    <div class="card">
      <h3>Listado de pozos</h3>

      <div id="zonaSinCliente" class="mensaje">
        Seleccioná un cliente para ver sus pozos.
      </div>

      <div id="zonaPozos" class="oculto">
        <label for="filtroPozo">Filtrar por descripción</label>
        <input type="text" id="filtroPozo" placeholder="Buscar pozo..." />

        <div class="acciones">
          <button class="btn-pri" onclick="cargarPozos()">Actualizar pozos</button>
          <button class="btn-alt" onclick="mostrarCrearPozo()">Crear pozo</button>
        </div>

        <div id="listaPozos" class="lista">
          <div class="item">Sin datos</div>
        </div>
      </div>
    </div>

    <!-- DERECHA -->
    <div class="card">
      <div id="panelBienvenida">
        <h3>Selección / Edición</h3>
        <p>Seleccioná un cliente para ver o crear pozos.</p>
      </div>

      <div id="panelCrearPozo" class="oculto">
        <h3>Crear pozo</h3>

        <label>Cliente</label>
        <input type="text" id="crearPozoCliente" readonly />

        <label for="descripcionPozo">Descripción</label>
        <input type="text" id="descripcionPozo" placeholder="Ej: Pozo 1 - Campo Norte" />

        <div class="fila-2">
          <div>
            <label for="diametroPerforacion">Diámetro perforación (pulgadas)</label>
            <input type="number" step="0.01" id="diametroPerforacion" placeholder="Ej: 8.5" />
          </div>
          <div>
            <label for="diametroCanieria">Diámetro cañería (pulgadas)</label>
            <input type="number" step="0.01" id="diametroCanieria" placeholder="Ej: 4" />
          </div>
        </div>

        <div class="fila-2">
          <div>
            <label for="tipoTablero">Tipo tablero</label>
            <input type="text" id="tipoTablero" placeholder="Texto" />
          </div>
          <div>
            <label for="potenciaMarca">Potencia / Marca</label>
            <input type="text" id="potenciaMarca" placeholder="Texto" />
          </div>
        </div>

        <div class="fila-3">
          <div>
            <label for="nivelEstatico">Nivel estático (m)</label>
            <input type="number" step="0.01" id="nivelEstatico" placeholder="Ej: 15" />
          </div>
          <div>
            <label for="nivelDinamico">Nivel dinámico (m)</label>
            <input type="number" step="0.01" id="nivelDinamico" placeholder="Ej: 22" />
          </div>
          <div>
            <label for="caudal">Caudal (m³)</label>
            <input type="number" step="0.01" id="caudal" placeholder="Ej: 12" />
          </div>
        </div>

        <label>Coordenadas</label>
        <div class="coord-box">
          <div><strong>Valor actual:</strong> <span id="txtCoordenadas">Sin coordenadas</span></div>
        </div>

        <div class="acciones">
          <button class="btn-pri" type="button" onclick="obtenerUbicacion()">Usar ubicación del dispositivo</button>
          <button class="btn-alt" type="button" onclick="activarSeleccionManual()">Elegir manualmente en mapa</button>
          <button class="btn-sec" type="button" onclick="abrirGoogleMapsCoordenadaActual()">Abrir en Google Maps</button>
        </div>

        <div id="mapaPozo"></div>

        <label for="observacionesPozo">Observaciones</label>
        <textarea id="observacionesPozo" placeholder="Texto que el usuario ingresa"></textarea>

        <div class="acciones">
          <button class="btn-ok" onclick="guardarPozo()">Guardar pozo</button>
          <button class="btn-sec" onclick="cerrarPaneles(); mostrarBienvenida();">Cancelar</button>
        </div>

        <div id="estadoPozo" class="mensaje"></div>
      </div>

      <div id="panelDetallePozo" class="oculto">
        <h3>Detalle de pozo</h3>

        <label>Cliente</label>
        <input type="text" id="detalleCliente" readonly />

        <label>Pozo</label>
        <input type="text" id="detallePozo" readonly />

        <div class="acciones">
          <button class="btn-pri" onclick="abrirMapsPozoSeleccionado()">Abrir ubicación en Google Maps</button>
        </div>

        <div id="detalleInfoPozo" class="coord-box"></div>
      </div>
    </div>
  </div>

  <script>
    // CAMBIAR POR TUS WEBHOOKS REALES
    const URL_LISTAR_POZOS = "https://pablonahuel.app.n8n.cloud/webhook/listar-pozos";
    const URL_GUARDAR_POZO = "https://pablonahuel.app.n8n.cloud/webhook/guardar-pozo";

    let clienteActual = { id: "", nombre: "" };
    let pozoActual = { id: "", descripcion: "", coordenadas: "" };
    let pozos = [];

    let mapa = null;
    let marcador = null;
    let modoSeleccionManual = false;
    let coordenadasActuales = "";

    function $(id) {
      return document.getElementById(id);
    }

    function actualizarEncabezado() {
      $("lblCliente").textContent = clienteActual.nombre || "Ninguno seleccionado";
      $("lblPozo").textContent = pozoActual.descripcion || "Ninguno seleccionado";
    }

    function cerrarPaneles() {
      $("panelBienvenida").classList.add("oculto");
      $("panelCrearPozo").classList.add("oculto");
      $("panelDetallePozo").classList.add("oculto");
    }

    function mostrarBienvenida() {
      cerrarPaneles();
      $("panelBienvenida").classList.remove("oculto");
    }

    function mostrarCrearPozo() {
      if (!clienteActual.id) {
        alert("Primero seleccioná un cliente.");
        return;
      }

      cerrarPaneles();
      $("panelCrearPozo").classList.remove("oculto");
      $("crearPozoCliente").value = clienteActual.nombre;
      $("estadoPozo").textContent = "";

      limpiarFormularioPozo();
      inicializarMapa();
      setTimeout(() => {
        if (mapa) mapa.invalidateSize();
      }, 200);
    }

    function limpiarFormularioPozo() {
      $("descripcionPozo").value = "";
      $("diametroPerforacion").value = "";
      $("diametroCanieria").value = "";
      $("tipoTablero").value = "";
      $("nivelEstatico").value = "";
      $("nivelDinamico").value = "";
      $("potenciaMarca").value = "";
      $("caudal").value = "";
      $("observacionesPozo").value = "";
      coordenadasActuales = "";
      actualizarTextoCoordenadas();
      quitarMarcador();
    }

    function mostrarDetallePozo(pozo) {
      cerrarPaneles();
      $("panelDetallePozo").classList.remove("oculto");

      $("detalleCliente").value = clienteActual.nombre;
      $("detallePozo").value = pozo.Descripcion || "";

      const html = `
        <div><strong>Diám. perforación:</strong> ${valorTexto(pozo.Diametro_Perforacion)}</div>
        <div><strong>Diám. cañería:</strong> ${valorTexto(pozo.Diametro_Cañeria)}</div>
        <div><strong>Tipo tablero:</strong> ${valorTexto(pozo.Tipo_Tablero)}</div>
        <div><strong>Nivel estático:</strong> ${valorTexto(pozo.Nivel_Estatico)}</div>
        <div><strong>Nivel dinámico:</strong> ${valorTexto(pozo.Nivel_Dinamico)}</div>
        <div><strong>Potencia / Marca:</strong> ${valorTexto(pozo.Potencia_Marca)}</div>
        <div><strong>Caudal:</strong> ${valorTexto(pozo.Caudal)}</div>
        <div><strong>Coordenadas:</strong> ${valorTexto(pozo.Coordenadas)}</div>
        <div><strong>Observaciones:</strong> ${valorTexto(pozo.Observaciones)}</div>
      `;
      $("detalleInfoPozo").innerHTML = html;
    }

    async function cargarPozos() {
      if (!clienteActual.id) return;

      const lista = $("listaPozos");
      lista.innerHTML = `<div class="item">Cargando pozos...</div>`;

      try {
        const res = await fetch(URL_LISTAR_POZOS, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            ID_Cliente: clienteActual.id
          })
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        pozos = Array.isArray(data) ? data : (data.items || data.data || []);
        renderPozos();
      } catch (error) {
        console.error(error);
        lista.innerHTML = `<div class="item">Error al cargar pozos.</div>`;
      }
    }

    function renderPozos() {
      const texto = $("filtroPozo").value.trim().toLowerCase();
      const lista = $("listaPozos");

      const filtrados = pozos.filter(p =>
        String(p.Descripcion || "").toLowerCase().includes(texto)
      );

      if (!filtrados.length) {
        lista.innerHTML = `
          <div class="item">
            <div class="item-sub">No hay pozos cargados para este cliente.</div>
          </div>
        `;
        return;
      }

      lista.innerHTML = filtrados.map(p => `
        <div class="item">
          <div class="item-titulo">${escapeHtml(p.Descripcion || "Sin descripción")}</div>
          <div class="item-sub">
            Diám. perforación: ${escapeHtml(valorTexto(p.Diametro_Perforacion))} |
            Caudal: ${escapeHtml(valorTexto(p.Caudal))}
          </div>
          <div class="item-sub">
            Coordenadas: ${escapeHtml(valorTexto(p.Coordenadas))}
          </div>
          <div class="item-acciones">
            <button class="btn-pri" onclick="seleccionarPozo('${escapeJs(p.ID_Pozo || "")}')">Seleccionar</button>
            <button class="btn-sec" onclick="abrirMapsDesdeLista('${escapeJs(p.Coordenadas || "")}')">Maps</button>
          </div>
        </div>
      `).join("");
    }

    function seleccionarPozo(idPozo) {
      const pozo = pozos.find(p => String(p.ID_Pozo) === String(idPozo));
      if (!pozo) return;

      pozoActual = {
        id: pozo.ID_Pozo || "",
        descripcion: pozo.Descripcion || "",
        coordenadas: pozo.Coordenadas || ""
      };

      actualizarEncabezado();
      mostrarDetallePozo(pozo);

      window.parent.postMessage({
        tipo: "pozo-seleccionado",
        pozoId: pozoActual.id,
        pozoDescripcion: pozoActual.descripcion
      }, "*");
    }

    async function guardarPozo() {
      const payload = {
        ID_Cliente: clienteActual.id,
        Descripcion: $("descripcionPozo").value.trim(),
        Diametro_Perforacion: numeroONull($("diametroPerforacion").value),
        Diametro_Cañeria: numeroONull($("diametroCanieria").value),
        Tipo_Tablero: $("tipoTablero").value.trim(),
        Nivel_Estatico: numeroONull($("nivelEstatico").value),
        Nivel_Dinamico: numeroONull($("nivelDinamico").value),
        Potencia_Marca: $("potenciaMarca").value.trim(),
        Caudal: numeroONull($("caudal").value),
        Coordenadas: coordenadasActuales,
        Observaciones: $("observacionesPozo").value.trim()
      };

      const estado = $("estadoPozo");
      estado.className = "mensaje";
      estado.textContent = "";

      if (!payload.Descripcion) {
        estado.className = "mensaje error";
        estado.textContent = "La descripción es obligatoria.";
        return;
      }

      try {
        estado.textContent = "Guardando pozo...";

        const res = await fetch(URL_GUARDAR_POZO, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();

        estado.className = "mensaje ok";
        estado.textContent = data.mensaje || "Pozo guardado correctamente.";

        pozoActual = {
          id: data.ID_Pozo || "",
          descripcion: payload.Descripcion,
          coordenadas: payload.Coordenadas || ""
        };

        actualizarEncabezado();

        window.parent.postMessage({
          tipo: "pozo-creado",
          pozoId: pozoActual.id,
          pozoDescripcion: pozoActual.descripcion
        }, "*");

        await cargarPozos();
        mostrarBienvenida();
      } catch (error) {
        console.error(error);
        estado.className = "mensaje error";
        estado.textContent = "Error al guardar pozo.";
      }
    }

    function numeroONull(valor) {
      const txt = String(valor || "").trim();
      if (txt === "") return null;
      const n = Number(txt);
      return isNaN(n) ? null : n;
    }

    function valorTexto(v) {
      if (v === null || v === undefined || v === "") return "-";
      return String(v);
    }

    function actualizarTextoCoordenadas() {
      $("txtCoordenadas").textContent = coordenadasActuales || "Sin coordenadas";
    }

function inicializarMapa() {
  if (!mapa) {
    mapa = L.map("mapaPozo").setView([-26.9, -65.4], 6);

    L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      {
        attribution: "Tiles © Esri"
      }
    ).addTo(mapa);

    mapa.on("click", function(e) {
      if (!modoSeleccionManual) return;
      const lat = e.latlng.lat.toFixed(6);
      const lng = e.latlng.lng.toFixed(6);
      coordenadasActuales = `${lat},${lng}`;
      ponerMarcador(lat, lng);
      actualizarTextoCoordenadas();
    });
  }
}

    function activarSeleccionManual() {
      modoSeleccionManual = true;
      alert("Hacé clic en el mapa para elegir manualmente la ubicación.");
    }

    function obtenerUbicacion() {
      if (!navigator.geolocation) {
        alert("Tu dispositivo no permite geolocalización.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude.toFixed(6);
          const lng = pos.coords.longitude.toFixed(6);
          coordenadasActuales = `${lat},${lng}`;
          actualizarTextoCoordenadas();
          ponerMarcador(lat, lng);

          if (mapa) {
            mapa.setView([lat, lng], 15);
          }
        },
        (err) => {
          console.error(err);
          alert("No se pudo obtener la ubicación del dispositivo.");
        },
        {
          enableHighAccuracy: true,
          timeout: 10000
        }
      );
    }

    function ponerMarcador(lat, lng) {
      if (!mapa) return;
      quitarMarcador();
      marcador = L.marker([lat, lng]).addTo(mapa);
    }

    function quitarMarcador() {
      if (marcador && mapa) {
        mapa.removeLayer(marcador);
        marcador = null;
      }
    }

    function abrirGoogleMapsCoordenadaActual() {
      if (!coordenadasActuales) {
        alert("No hay coordenadas cargadas.");
        return;
      }
      const url = `https://www.google.com/maps?q=${encodeURIComponent(coordenadasActuales)}`;
      window.open(url, "_blank");
    }

    function abrirMapsDesdeLista(coords) {
      if (!coords) {
        alert("Ese pozo no tiene coordenadas guardadas.");
        return;
      }
      const url = `https://www.google.com/maps?q=${encodeURIComponent(coords)}`;
      window.open(url, "_blank");
    }

    function abrirMapsPozoSeleccionado() {
      if (!pozoActual.coordenadas) {
        alert("El pozo seleccionado no tiene coordenadas.");
        return;
      }
      const url = `https://www.google.com/maps?q=${encodeURIComponent(pozoActual.coordenadas)}`;
      window.open(url, "_blank");
    }

    function escapeHtml(texto) {
      return String(texto)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeJs(texto) {
      return String(texto)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll('"', '\\"')
        .replaceAll("\n", " ")
        .replaceAll("\r", " ");
    }

    $("filtroPozo").addEventListener("input", renderPozos);

    window.addEventListener("message", (event) => {
      const data = event.data || {};

      if (data.tipo === "cliente-seleccionado") {
        clienteActual.id = data.clienteId || "";
        clienteActual.nombre = data.clienteNombre || "";
        pozoActual = { id: "", descripcion: "", coordenadas: "" };

        actualizarEncabezado();

        $("zonaSinCliente").classList.add("oculto");
        $("zonaPozos").classList.remove("oculto");

        mostrarBienvenida();
        cargarPozos();
      }

      if (data.tipo === "cliente-limpiado") {
        clienteActual = { id: "", nombre: "" };
        pozoActual = { id: "", descripcion: "", coordenadas: "" };
        actualizarEncabezado();

        $("zonaSinCliente").classList.remove("oculto");
        $("zonaPozos").classList.add("oculto");
        $("listaPozos").innerHTML = `<div class="item">Sin datos</div>`;

        mostrarBienvenida();
      }

      if (data.tipo === "abrir-crear-pozo") {
        clienteActual.id = data.clienteId || "";
        clienteActual.nombre = data.clienteNombre || "";
        pozoActual = { id: "", descripcion: "", coordenadas: "" };
        actualizarEncabezado();

        $("zonaSinCliente").classList.add("oculto");
        $("zonaPozos").classList.remove("oculto");

        mostrarCrearPozo();
      }
    });

    mostrarBienvenida();
    actualizarEncabezado();
  </script>
</body>
</html>
