<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba Guardar Pozo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f7fb; }
    .bloque { background: white; border: 1px solid #d9e2f1; border-radius: 10px; padding: 20px; max-width: 700px; }
    .fila { display: grid; grid-template-columns: 180px 1fr; gap: 10px; margin-bottom: 12px; align-items: center; }
    input, select { width: 100%; padding: 10px; border: 1px solid #bfcde0; border-radius: 6px; box-sizing: border-box; }
    button { padding: 10px 16px; border: none; border-radius: 6px; background: #198754; color: white; font-weight: bold; cursor: pointer; }
    .mensaje { margin-top: 15px; padding: 12px; background: #eef4ff; border: 1px solid #cfe0ff; border-radius: 6px; }
  </style>
</head>
<body>

  <div class="bloque">
    <h2>Guardar Pozo</h2>

    <div class="fila">
      <label for="idCliente">ID Cliente</label>
      <input type="text" id="idCliente" placeholder="Ej: 1">
    </div>

    <div class="fila">
      <label for="diametroPerforacion">Diametro Perforacion</label>
      <input type="text" id="diametroPerforacion" placeholder="Ej: 6 pulgadas">
    </div>

    <button onclick="guardarPozo()">Guardar Pozo</button>

    <div id="mensaje" class="mensaje">Listo para probar.</div>
  </div>

  <script>
    async function guardarPozo() {
      const idCliente = document.getElementById("idCliente").value.trim();
      const diametro = document.getElementById("diametroPerforacion").value.trim();

      if (!idCliente) {
        document.getElementById("mensaje").innerText = "Debe ingresar ID_Cliente.";
        return;
      }

      if (!diametro) {
        document.getElementById("mensaje").innerText = "Debe ingresar Diametro_Perforacion.";
        return;
      }

      try {
        const params = new URLSearchParams();
        params.append("ID_Cliente", idCliente);
        params.append("Diametro_Perforacion", diametro);

        const res = await fetch("https://pablonahuel.app.n8n.cloud/webhook/guardar-pozo", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: params.toString()
        });

        const data = await res.json();

        if (data.accion === "guardado") {
          document.getElementById("mensaje").innerText =
            `✅ ${data.mensaje} | ID_Pozo: ${data.ID_Pozo} | ID_Cliente: ${data.ID_Cliente}`;
        } else if (data.accion === "existe") {
          document.getElementById("mensaje").innerText =
            `⚠️ ${data.mensaje}`;
        } else {
          document.getElementById("mensaje").innerText = "❌ Respuesta no esperada.";
        }

      } catch (error) {
        console.error(error);
        document.getElementById("mensaje").innerText = "❌ Error al guardar pozo.";
      }
    }
  </script>

</body>
</html>
