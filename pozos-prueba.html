<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba Guardar Pozo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f7fb;
    }

    .bloque {
      background: white;
      border: 1px solid #d9e2f1;
      border-radius: 10px;
      padding: 20px;
      max-width: 700px;
    }

    .fila {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #bfcde0;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #198754;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #157347;
    }

    .mensaje {
      margin-top: 15px;
      padding: 12px;
      background: #eef4ff;
      border: 1px solid #cfe0ff;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <div class="bloque">
    <h2>Guardar Pozo</h2>

    <div class="fila">
      <label for="idCliente">ID Cliente</label>
      <input type="number" id="idCliente" placeholder="Ej: 1" value="1">
    </div>

    <div class="fila">
      <label for="diametroPerforacion">Diametro Perforacion</label>
      <input type="number" id="diametroPerforacion" placeholder="Ej: 50" value="50">
    </div>

    <button type="button" onclick="guardarPozo()">Guardar Pozo</button>

    <div id="mensaje" class="mensaje">Listo para probar.</div>
  </div>

  <script>
    async function guardarPozo() {
      const msg = document.getElementById("mensaje");
      const idClienteEl = document.getElementById("idCliente");
      const diametroEl = document.getElementById("diametroPerforacion");

      try {
        if (!idClienteEl || !diametroEl) {
          msg.innerHTML = "❌ No se encontraron los campos del formulario.";
          return;
        }

        const idCliente = Number(idClienteEl.value);
        const diametroPerforacion = Number(diametroEl.value);

        if (!idCliente || idCliente <= 0) {
          msg.innerHTML = "❌ Ingresá un ID Cliente válido.";
          return;
        }

        if (!diametroPerforacion || diametroPerforacion <= 0) {
          msg.innerHTML = "❌ Ingresá un diámetro de perforación válido.";
          return;
        }

        const payload = {
          ID_Cliente: idCliente,
          Diametro_Perforacion: diametroPerforacion
        };

        console.log("Payload enviado:", payload);

        const res = await fetch("https://pablonahuel.app.n8n.cloud/webhook/guardar-pozo", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const texto = await res.text();

        console.log("Respuesta status:", res.status);
        console.log("Respuesta body:", texto);

        if (!res.ok) {
          msg.innerHTML = "❌ Error del servidor: " + texto;
          return;
        }

        try {
          const json = JSON.parse(texto);

          if (json.ok) {
            msg.innerHTML = "✅ " + json.mensaje;
          } else {
            msg.innerHTML = "⚠️ " + json.mensaje;
          }
        } catch (e) {
          msg.innerHTML = "✅ Respuesta recibida correctamente.";
        }

      } catch (error) {
        console.error(error);
        msg.innerHTML = "❌ Error al conectar con el webhook.";
      }
    }
  </script>

</body>
</html>
